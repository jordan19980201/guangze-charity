<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>內容管理後台｜新竹市廣澤慈善協會</title>
  <link rel="icon" href="/assets/img/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css?v=20260602e" />
</head>
<body>
  <!-- 登入畫面 -->
  <div id="login" class="login hidden">
    <form class="login__card" id="login-form">
      <img src="/assets/img/logo.png" alt="廣澤慈善協會" class="login__logo" />
      <h1>內容管理後台</h1>
      <p class="login__sub">請以協會帳號登入</p>
      <label>帳號<input type="text" id="username" autocomplete="username" required /></label>
      <label>密碼<input type="password" id="password" autocomplete="current-password" required /></label>
      <button type="submit" class="btn btn--primary" id="login-btn">登入</button>
      <p class="msg" id="login-msg"></p>
    </form>
  </div>

  <!-- 設定未完成提示 -->
  <div id="setup" class="login hidden">
    <div class="login__card">
      <img src="/assets/img/logo.png" alt="廣澤慈善協會" class="login__logo" />
      <h1>後台尚未啟用</h1>
      <p class="login__sub">系統管理設定（Vercel 環境變數）尚未完成。<br />請完成設定後再登入，或聯繫網站維護人員。</p>
    </div>
  </div>

  <!-- 管理介面 -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar__brand"><img src="/assets/img/logo.png" alt="" /> 內容管理後台</div>
      <div class="topbar__right">
        <a href="/index.html" target="_blank" class="topbar__link">↗ 查看網站</a>
        <span id="who" class="topbar__who"></span>
        <button class="btn btn--ghost" id="logout-btn">登出</button>
      </div>
    </header>
    <nav class="tabs" id="tabs"></nav>
    <main class="content" id="editor"></main>
    <div class="savebar" id="savebar">
      <span class="savebar__credit">取之社會　用之社會</span>
      <span class="savebar__hint" id="save-hint"></span>
      <button class="btn btn--outline" id="preview-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        即時預覽
      </button>
      <button class="btn btn--primary" id="save-btn">儲存變更</button>
    </div>
  </div>

  <!-- 預覽浮層 -->
  <div id="preview" class="preview hidden" aria-hidden="true">
    <div class="preview__topbar">
      <div class="preview__title">
        <span class="preview__eye">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
        即時預覽
        <span class="preview__url" id="preview-url"></span>
      </div>
      <div class="preview__ctrls">
        <div class="preview__device" role="tablist">
          <button class="preview__device-btn" data-device="desktop" type="button">電腦</button>
          <button class="preview__device-btn" data-device="tablet" type="button">平板</button>
          <button class="preview__device-btn" data-device="mobile" type="button">手機</button>
        </div>
        <button class="btn btn--ghost btn--sm" id="preview-refresh" type="button" title="套用最新編輯">↻ 套用</button>
        <button class="btn btn--danger btn--sm" id="preview-close" type="button">✕ 關閉</button>
      </div>
    </div>
    <div class="preview__stage" id="preview-stage">
      <iframe id="preview-iframe" title="即時預覽" loading="lazy"></iframe>
    </div>
  </div>

  <div id="loading" class="loading">載入中…</div>

  <script src="/admin/admin.js?v=20260602e"></script>
</body>
</html>
